<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBE CODE — Modern Web Design & Development</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap');
        @import url('https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            font-family: 'Outfit', sans-serif;
        }

        /* ===== TOP GRADIENT ===== */
        #top-gradient {
            position: fixed;
            top: -30vh;
            left: 0;
            width: 100vw;
            height: auto;
            display: block;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at center top, rgba(0,0,0,0.3), transparent 70%);
            height: 60vh;
        }

        /* ===== HERO CONTENT ===== */
        .hero-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding-top: 6vh;
            width: 95%;
            max-width: 1100px;
            margin: 0 auto;
        }

        .hero-title {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 3.5rem;
            font-weight: 400;
            color: #ffffff;
            line-height: 1.15;
            margin-bottom: 1.5rem;
            letter-spacing: -0.015em;
            text-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .hero-subtitle {
            font-size: 1.2rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 2.5rem;
            letter-spacing: 0.02em;
        }

        .hero-btn {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            color: #ffffff;
            background-color: #000000;
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 1.3rem 2.5rem;
            border-radius: 9999px;
            display: inline-flex;
            align-items: center;
            gap: 0.9rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.4);
            outline: none;
        }

        .hero-btn:hover {
            background-color: #ffffff;
            color: #000000;
            border-color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(0, 0, 0, 0.3);
        }

        .hero-btn:active {
            transform: translateY(0);
        }

        .blinking-dot {
            width: 10px;
            height: 10px;
            background-color: #39FF14;
            border-radius: 50%;
            position: relative;
            display: inline-block;
            animation: pulse-glow 2s infinite ease-in-out;
        }

        .blinking-dot::after {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            background-color: rgba(57, 255, 20, 0.45);
            border-radius: 50%;
            animation: wave-expand 2s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% {
                opacity: 0.5;
                transform: scale(0.85);
                box-shadow: 0 0 4px rgba(57, 255, 20, 0.3);
            }
            50% {
                opacity: 1;
                transform: scale(1.1);
                box-shadow: 0 0 12px rgba(57, 255, 20, 0.9);
            }
        }

        @keyframes wave-expand {
            0% {
                transform: scale(0.6);
                opacity: 0.9;
            }
            100% {
                transform: scale(2.3);
                opacity: 0;
            }
        }

        /* ===== FOOTER CONTAINER ===== */
        .footer-container {
            position: fixed;
            top: 50vh;
            left: 20px;
            right: 20px;
            width: calc(100vw - 40px);
            transform: translateY(-50%);
            z-index: 3;
            display: flex;
            flex-direction: column;
        }

        .footer-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            width: 100%;
            padding: 0 5px;
        }

        .footer-title {
            font-family: 'General Sans', -apple-system, sans-serif;
            font-size: 1.4rem;
            font-weight: 400;
            color: #ffffff;
            letter-spacing: -0.015em;
            margin: 0;
        }

        .footer-title.quote {
            text-transform: none;
        }

        .footer-divider {
            border: none;
            height: 1px;
            background-color: rgba(255, 255, 255, 0.2);
            margin: 1.6rem 0;
            width: 100%;
        }

        .footer-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 0 5px;
        }

        .footer-socials {
            display: flex;
            gap: 1.25rem;
            align-items: center;
            flex: 1;
        }

        .social-icon {
            color: rgba(255, 255, 255, 0.55);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .social-icon:hover {
            color: #39FF14;
            transform: translateY(-2px);
        }

        .footer-links {
            display: flex;
            gap: 2.8rem;
            justify-content: center;
            align-items: center;
            flex: 2;
        }

        .footer-link {
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 400;
            color: #ffffff;
            text-decoration: none;
            letter-spacing: 0.03em;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .footer-link:hover {
            opacity: 0.75;
            transform: translateY(-1px);
        }

        .footer-copyright {
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.45);
            text-align: right;
            flex: 1;
            letter-spacing: 0.02em;
        }

        /* ===== WORDMARK ===== */
        .footer-logo-wrap {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            width: 100%;
            padding: 0 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3;
            margin: 0;
        }

        .footer-logo-text {
            font-family: 'General Sans', -apple-system, sans-serif;
            font-size: 21.9vw;
            font-weight: 400;
            color: #ffffff;
            letter-spacing: -0.03em;
            margin-right: -0.03em;
            transform: translateX(-20px);
            line-height: 0.8;
            margin-top: 0;
            margin-bottom: 0;
            margin-left: 0;
            text-align: center;
            width: 100%;
            pointer-events: none;
            opacity: 0.95;
            text-shadow: none;
            white-space: nowrap;
        }

        .footer-logo-text .letter-wrapper {
            display: inline-block;
            overflow: hidden;
            vertical-align: bottom;
            line-height: 0.8;
        }

        .footer-logo-text .letter-inner {
            display: inline-block;
            opacity: 0;
            transform: translateX(-105%);
            filter: blur(20px);
            animation: letter-reveal-mask 1.2s cubic-bezier(0.05, 0.9, 0.1, 1) forwards;
        }

        @keyframes letter-reveal-mask {
            0% {
                opacity: 0;
                transform: translateX(-105%);
                filter: blur(20px);
            }
            25% {
                opacity: 1;
            }
            100% {
                opacity: 0.95;
                transform: translateX(0);
                filter: blur(0);
            }
        }

        /* ===== HERO TITLE REVEAL ===== */
        .hero-title .word-wrapper {
            display: inline-block;
            overflow: hidden;
            vertical-align: bottom;
            padding-bottom: 0.15em;
            margin-bottom: -0.15em;
        }

        .hero-title .word-inner {
            display: inline-block;
            opacity: 0;
            transform: translateY(105%);
            filter: blur(20px);
            animation: word-reveal-mask 1.3s cubic-bezier(0.05, 0.9, 0.1, 1) forwards;
        }

        @keyframes word-reveal-mask {
            0% {
                opacity: 0;
                transform: translateY(105%);
                filter: blur(20px);
            }
            30% {
                opacity: 1;
            }
            100% {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        /* ===== VIDEO CONTAINER ===== */
        .video-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 90vh;
            overflow: hidden;
            z-index: -1;
        }

        #bg-video {
            width: 100%;
            height: 110%;
            object-fit: cover;
            display: block;
            transform: translateY(0%);
        }

        /* ===== CURSOR ===== */
        .glass-cursor-card {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 99999;
            pointer-events: none;
            padding: 0.75rem 1.5rem;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 9999px;
            box-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.15);
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            will-change: transform, opacity;
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                        background 0.35s cubic-bezier(0.16, 1, 0.3, 1),
                        border-color 0.35s cubic-bezier(0.16, 1, 0.3, 1),
                        box-shadow 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-cursor-card.active {
            opacity: 1;
        }

        .glass-cursor-card.dark-mode {
            background: rgba(0, 0, 0, 0.82);
            border-color: rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.05);
        }

        .cursor-card-text {
            font-family: 'General Sans', -apple-system, sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.06em;
            color: #39FF14;
            text-transform: uppercase;
            white-space: nowrap;
            text-shadow: 0 0 8px rgba(57, 255, 20, 0.45);
        }

        .cursor-card-text .text-white {
            color: #ffffff;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.25);
        }

        .cursor-ring-outline {
            position: fixed;
            top: 0;
            left: 0;
            width: 48px;
            height: 48px;
            border: 1.5px solid rgba(255, 255, 255, 0.45);
            border-radius: 50%;
            z-index: 99998;
            pointer-events: none;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            will-change: transform, opacity;
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                        border-color 0.4s ease;
        }

        .cursor-ring-outline.active {
            opacity: 1;
        }

        .cursor-ring-outline.expanded {
            border-color: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>
<body>
    <div id="top-gradient"></div>

    <main class="hero-content">
        <h1 class="hero-title">Fast & Beautiful <br> Web Design</h1>
        <p class="hero-subtitle">Custom websites shipped in days, not months</p>
        <button class="hero-btn">
            <span class="btn-text">Book a demo</span>
            <span class="blinking-dot"></span>
        </button>
    </main>

    <footer class="footer-container">
        <div class="footer-top">
            <h2 class="footer-title">Get Started</h2>
            <h2 class="footer-title quote">Ship Faster</h2>
        </div>
        <hr class="footer-divider">
        <div class="footer-bottom">
            <div class="footer-socials">
                <a href="#" aria-label="Telegram" class="social-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-9.5 19.5L3.5 11l16-9z"></path></svg>
                </a>
                <a href="#" aria-label="X" class="social-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4l11.733 16h4.267l-11.733 -16z"></path><path d="M4 20l6.768 -6.768m2.46 -2.46l6.772 -6.772"></path></svg>
                </a>
                <a href="#" aria-label="Dribbble" class="social-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M8.56 2.75c4.37 6.03 6.02 9.42 8.6 17.72"></path><path d="M2.75 15.44c7.26-4.37 9.66-6.02 17.72-8.6"></path><circle cx="12" cy="12" r="2"></circle></svg>
                </a>
            </div>
            <nav class="footer-links">
                <a href="#portfolio" class="footer-link">Portfolio</a>
                <a href="#services" class="footer-link">Services</a>
                <a href="#pricing" class="footer-link">Pricing</a>
                <a href="#contact" class="footer-link">Contact</a>
            </nav>
            <div class="footer-copyright">
                © 2026 VIBE CODE
            </div>
        </div>
    </footer>

    <div class="footer-logo-wrap">
        <h2 class="footer-logo-text">VIBE CODE</h2>
    </div>

    <div class="video-container">
        <video autoplay muted playsinline loop id="bg-video">
            <source src="data:video/mp4;base64,AAAAIGZ0eXBpc29tAAACAGlzb21pc2MoaXNvAW1wNGJhc2U0Y29kZWMpAQAAAr+btb9zSLeWLNgg2SPu73gyAEwgUEVAVkQyU5z/AAHu/wEBEAAAAuJmdERtcGEBAAAAA2Nobm9kU2SxAAACKgAAAAEAAAA8AAAABQEBaGQGbQAAAAAABAAkb1N0c0QA" type="video/mp4">
        </video>
    </div>

    <div id="cursor-ring" class="cursor-ring-outline"></div>
    <div id="glass-card" class="glass-cursor-card">
        <span class="cursor-card-text"><span class="text-white">Say</span> Hello!</span>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const logoText = document.querySelector('.footer-logo-text');
            if (logoText) {
                const text = logoText.textContent.trim();
                logoText.innerHTML = '';
                [...text].forEach((char, index) => {
                    const wrapper = document.createElement('span');
                    wrapper.className = 'letter-wrapper';
                    const inner = document.createElement('span');
                    inner.textContent = char === ' ' ? ' ' : char;
                    inner.className = 'letter-inner';
                    inner.style.animationDelay = `${index * 0.09}s`;
                    wrapper.appendChild(inner);
                    logoText.appendChild(wrapper);
                });
            }

            const heroTitle = document.querySelector('.hero-title');
            if (heroTitle) {
                const text = heroTitle.innerHTML;
                const parts = text.split(/(\s+|<br\s*\/?>)/i);
                heroTitle.innerHTML = '';
                let wordIndex = 0;
                parts.forEach(part => {
                    if (part.trim() === '') {
                        heroTitle.appendChild(document.createTextNode(' '));
                    } else if (part.toLowerCase().startsWith('<br')) {
                        heroTitle.appendChild(document.createElement('br'));
                    } else {
                        const wrapper = document.createElement('span');
                        wrapper.className = 'word-wrapper';
                        const inner = document.createElement('span');
                        inner.className = 'word-inner';
                        inner.textContent = part;
                        inner.style.animationDelay = `${wordIndex * 0.1}s`;
                        wordIndex++;
                        wrapper.appendChild(inner);
                        heroTitle.appendChild(wrapper);
                    }
                });
            }

            const glassCard = document.getElementById('glass-card');
            const cursorRing = document.getElementById('cursor-ring');
            if (glassCard && cursorRing) {
                let mouseX = window.innerWidth / 2;
                let mouseY = window.innerHeight / 2;
                let cardX = mouseX;
                let cardY = mouseY;
                let ringX = mouseX;
                let ringY = mouseY;
                let isFirstMove = true;
                let scale = 0;
                let targetScale = 0;
                let isHoveringBtn = false;

                document.addEventListener('mousemove', (e) => {
                    mouseX = e.clientX;
                    mouseY = e.clientY;
                    if (isFirstMove) {
                        cardX = mouseX;
                        cardY = mouseY;
                        ringX = mouseX;
                        ringY = mouseY;
                        isFirstMove = false;
                        glassCard.classList.add('active');
                        cursorRing.classList.add('active');
                    }
                    if (!isHoveringBtn) {
                        targetScale = 1;
                    }
                });

                document.addEventListener('mouseleave', () => {
                    targetScale = 0;
                });

                document.addEventListener('mouseenter', () => {
                    if (!isHoveringBtn) {
                        targetScale = 1;
                    }
                });

                const heroBtn = document.querySelector('.hero-btn');
                if (heroBtn) {
                    heroBtn.addEventListener('mouseenter', () => {
                        isHoveringBtn = true;
                        targetScale = 0;
                        cursorRing.classList.add('expanded');
                    });
                    heroBtn.addEventListener('mouseleave', () => {
                        isHoveringBtn = false;
                        targetScale = 1;
                        cursorRing.classList.remove('expanded');
                    });
                }

                const updatePhysics = () => {
                    cardX += (mouseX - cardX) * 0.08;
                    cardY += (mouseY - cardY) * 0.08;
                    ringX = mouseX;
                    ringY = mouseY;
                    scale += (targetScale - scale) * 0.15;
                    const currentRingScale = cursorRing.classList.contains('expanded') ? 1.6 * scale : scale;
                    glassCard.style.transform = `translate3d(${cardX}px, ${cardY}px, 0) translate(-50%, -50%) scale(${scale})`;
                    cursorRing.style.transform = `translate3d(${ringX}px, ${ringY}px, 0) translate(-50%, -50%) scale(${currentRingScale})`;
                    requestAnimationFrame(updatePhysics);
                };
                updatePhysics();
            }
        });
    </script>
</body>
</html>
